app-id: io.github.AronCalvert.Workouts
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: workouts

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf

modules:
  - name: workouts
    buildsystem: meson
    sources:
      - type: dir
        path: .
