app-id: io.github.AronCalvert.Workouts
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
command: workouts

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=xdg-run/dconf
  - --filesystem=~/.config/dconf:ro
  - --env=DCONF_USER_CONFIG_DIR=.config/dconf

modules:
  - name: workouts
    buildsystem: meson
    sources:
      - type: archive
        url: https://github.com/AronCalvert/gnome-workouts/archive/refs/tags/v0.1.0.tar.gz
        sha256: 0019dfc4b32d63c1392aa264aed2253c1e0c2fb09216f8e2cc269bbfb8bb49b5
